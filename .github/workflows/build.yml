name: Build Legendary EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install Pillow pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "RaceTimerPro_Legendary" --icon="icon.ico" --add-data "icon.png;." --add-data "icon.ico;." race_timer_app.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RaceTimerPro-EXE
        path: dist/RaceTimerPro_Legendary.exe
